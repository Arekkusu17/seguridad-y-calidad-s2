<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Agendar Cita</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
<div class="container">
    <main class="card">
        <h1 class="page-title">Agendar Cita</h1>

        <form th:action="@{/appointments}" th:object="${appointment}" method="post">
    <div>
    
   <label>Paciente:
            <select name="patientId">
               
<option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name}"></option>
  
         </select>
        </label>
    </div>
    <div>
        <label>Fecha y hora: <input type="datetime-local" name="dateTimeStr"/></label>
    </div>
   
<div>
        <label>Motivo: <input type="text" th:field="*{reason}"/></label>
    </div>
    <div>
        <label>Veterinario: <input type="text" th:field="*{veterinarian}"/></label>
    </div>
    <div>
        <button type="submit">Guardar</button>
    </div>
</body>
        </form>

        <div style="margin-top:12px">
            <a th:href="@{/appointments}">Volver al listado</a>
       
</div>
    </main>
</div>

</body>
</html>
