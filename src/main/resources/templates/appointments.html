<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Citas</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
</head>
<body>
<main class="card">
    <h1 class="page-title">Listado de Citas</h1>

    <div>
        <a href="/appointments/new">Agendar nueva cita</a>
    </div>

    <h2>Existing appointments</h2>
    <ul id="list"></ul>
    <nav>
        <a href="/patients">Patients</a>
    </nav>
    <script>
    function getToken() { return localStorage.getItem('jwt'); }
    function authHeader() { const t=getToken(); return t? { 'Authorization': t } : {}; }

    async function loadAppointments(){
        const res = await fetch('/api/appointments', { headers: authHeader() });
        if (!res.ok) { document.getElementById('list').innerText = 'Error: '+res.status; return; }
        const arr = await res.json();
        const ul = document.getElementById('list'); ul.innerHTML='';
        arr.forEach(a=>{ const li=document.createElement('li'); li.innerText = `${a.id} - ${a.appointmentDateTime} - patient:${a.patient? a.patient.id : 'n/a'} - vet:${a.veterinarian}`; ul.appendChild(li); });
    }

    loadAppointments();
    </script>

    <div style="margin-top:12px">
        <a href="/">Volver al inicio</a>
    </div>
    </main>
</div>

</body>
</html>
