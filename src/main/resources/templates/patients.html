<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Pacientes</title>
    <link rel="stylesheet" type="text/css" href="/style.css">
    </head>
<body>
<main class="card">
    <h1 class="page-title">Listado de Pacientes</h1>

    <div>
        <a href="/patients/new">Registrar nuevo paciente</a>
        <span class="muted">(Debes iniciar sesión para registrar pacientes)</span>
    </div>

    <h2>Existing patients</h2>
    <ul id="list"></ul>
    <nav>
        <a href="/appointments">Appointments</a>
    </nav>
    <script>
    function getToken() { return localStorage.getItem('jwt'); }
    function authHeader() { const t=getToken(); return t? { 'Authorization': t } : {}; }

    async function loadPatients(){
        const res = await fetch('/api/patients', { headers: Object.assign({'Accept':'application/json'}, authHeader()) });
        if (!res.ok) { document.getElementById('list').innerText = 'Error: '+res.status; return; }
        const arr = await res.json();
        const ul = document.getElementById('list'); ul.innerHTML='';
        arr.forEach(p=>{ const li=document.createElement('li'); li.innerText = `${p.id} - ${p.name} (${p.species}) - owner: ${p.ownerName}`; ul.appendChild(li); });
    }


    loadPatients();
    </script>

    <div>
      <a href="/">Volver al inicio</a>
    </div>
    </main>
</body>
</html>
