<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head>
    <meta charset="UTF-8"/>
    <title>Pacientes</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
    </head>
<body>
<main class="card">
    <h1 class="page-title">Listado de Pacientes</h1>

    <div>
        <a href="/patients/new">Registrar nuevo paciente</a>
    </div>

    <h2>Existing patients</h2>
    <table id="list" class="data-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Especie</th>
                <th>Raza</th>
                <th>Edad</th>
                <th>Propietario</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <nav>
        <a href="/appointments">Appointments</a>
    </nav>
    <script>
    function getToken() { return localStorage.getItem('jwt'); }
    function authHeader() { const t=getToken(); return t? { 'Authorization': t } : {}; }

    async function loadPatients(){
        const res = await fetch('/api/patients', { headers: Object.assign({'Accept':'application/json'}, authHeader()) });
        const table = document.getElementById('list');
        const tbody = table.querySelector('tbody');
        tbody.innerHTML = '';
        if (!res.ok) { const tr=document.createElement('tr'); const td=document.createElement('td'); td.colSpan=6; td.innerText = 'Error: '+res.status; tr.appendChild(td); tbody.appendChild(tr); return; }
        const arr = await res.json();
        arr.forEach(p=>{
            const tr = document.createElement('tr');
            const cells = [p.id, p.name, p.species, p.breed || '', p.age || '', p.ownerName || ''];
            cells.forEach(c=>{ const td=document.createElement('td'); td.innerText = c; tr.appendChild(td); });
            tbody.appendChild(tr);
        });
    }


    loadPatients();
    </script>

    <div style="margin-top:12px">
      <a href="/">Volver al inicio</a>
    </div>
    </main>
</body>
</html>
